services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    image: alpine:latest
    command: sh -c "echo 'App started, db is healthy'; sleep infinity"
    depends_on:
      db:
        condition: service_healthy
